body:
  text: 上清太微帝君結帶真文法一名交帶文出於太極交帶經右出洞真第四部卷第三十一陸先生真本具出色數如左本科受齋三十日𧵥金八兩鈕九雙按此法太微帝君清齋玉天受於高上玉皇分靈盟於九户結中帶於天門投誓信於太空告命於九玄攝五靈於玉字召萬騎於無間之道亦曰交落之文也其法首上部九符即是高上玉皇未兆於九空之中結自然之精出於玄母之胞澄鍊瓊胎以化成九帝之符以黄筆書之北向服之變形易容得見太微帝君乘飛霞羽蓋遊戲玄都也中部九符即是九天清凝之炁結成自然之章經於九玄之母化生靈文以青筆書之北向服之得見太微帝君乘空飛行上昇九天也下部五符是五帝未分之初於虚无之中結空洞之精鍊九玄之母化生成文當以朱筆書之向西服之而有五色精光乘空飛行上昇太清男以白紋女以紫紋令廣九寸長九尺按次書之其下文云七祖充責萬劫不原皆如高上紫素盟文者此言依高上之旨已成真人合度紫素之文也故其首云當傳後聖得道之人是也上清太微帝君結帶真文法
